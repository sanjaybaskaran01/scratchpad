<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Scratchpad — developer clipboard</title>
  <meta name="description" content="Paste code, images, and text. Share instantly via URL. No backend, no account." />
  <meta name="author" content="sanjaybaskaran01" />
  <meta name="robots" content="index, follow" />
  <!-- canonical/OG URLs are set dynamically for multi-domain support -->

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="Scratchpad" />
  <meta property="og:title"       content="Scratchpad — developer clipboard" />
  <meta property="og:description" content="Paste code, images, and text. Share instantly via URL. No backend, no account." />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Scratchpad — developer clipboard" />
  <meta name="twitter:description" content="Paste code, images, and text. Share instantly via URL. No backend, no account." />
  <meta name="twitter:creator"     content="@sanjaybaskaran01" />

  <!-- PWA / Mobile -->
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Scratchpad" />
  <link rel="apple-touch-icon" sizes="180x180" href="../img/apple-touch-icon.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="../img/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon-16.png" />

  <!-- Dynamic meta for multi-domain support -->
  <script>
    (function () {
      var origin = location.origin;
      var base = location.pathname.replace(/\/$/, '');
      var url = origin + base + '/';
      var imgBase = origin + base.replace(/\/app$/, '') + '/img/og.png';
      function setMeta(attr, key, val) {
        var el = document.querySelector('meta[' + attr + '="' + key + '"]');
        if (el) el.setAttribute('content', val);
      }
      var link = document.createElement('link');
      link.rel = 'canonical'; link.href = url;
      document.head.appendChild(link);
      setMeta('property', 'og:url', url);
      setMeta('property', 'og:image', imgBase);
      setMeta('name', 'twitter:image', imgBase);
      var ld = document.createElement('script');
      ld.type = 'application/ld+json';
      ld.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Scratchpad",
        "url": url,
        "description": "Paste code, images, and text. Share instantly via URL. No backend, no account.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires a modern browser with IndexedDB support",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      });
      document.head.appendChild(ld);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <link rel="manifest" href="../manifest.json" />
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
